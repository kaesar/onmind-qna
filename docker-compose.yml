services:
  quiz-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onmind-qna
    ports:
      - "8080:80"
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    volumes:
      - ./Quiz.md:/usr/share/nginx/html/Quiz.md:ro
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
      - quiz-network

  # Optional service for hot reload
  quiz-dev:
    profiles: ["dev"]
    image: nginx:1.25-alpine
    container_name: quiz-markdown-dev
    ports:
      - "3000:80"
    volumes:
      - .:/usr/share/nginx/html:ro
      - ./nginx-dev.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - quiz-network

  # Optional service for monitoring
  nginx-exporter:
    profiles: ["monitoring"]
    image: nginx/nginx-prometheus-exporter:0.10.0
    container_name: quiz-nginx-exporter
    ports:
      - "9113:9113"
    command:
      - -nginx.scrape-uri=http://quiz-app/metrics
    depends_on:
      - quiz-app
    networks:
      - quiz-network

networks:
  quiz-network:
    driver: bridge
    name: quiz-markdown-network

volumes:
  quiz-logs:
    driver: local